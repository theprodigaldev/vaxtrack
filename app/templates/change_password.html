{% extends "base.html" %}
{% block title %}Change Password VaxTrack{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i data-feather="lock" class="feather-lg" style="color:var(--teal-500);"></i> Change Password</h2>
        <p>Update your account password.</p>
    </div>
</div>

<div class="card" style="max-width:480px;">
    <form method="POST" action="{{ url_for('auth.change_password') }}">
        <div class="form-group">
            <label for="old_password">Current Password</label>
            <input type="password" id="old_password" name="old_password" required autocomplete="current-password">
        </div>
        <div class="form-group">
            <label for="new_password">New Password <span style="font-size:.75rem; color:var(--slate-400);">(min 8 characters)</span></label>
            <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">Update Password</button>
    </form>
</div>
{% endblock %}
