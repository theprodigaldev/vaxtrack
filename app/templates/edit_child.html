{% extends "base.html" %}
{% block title %}Edit Child VaxTrack{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Edit: {{ child.first_name }} {{ child.last_name }}</h2>
        <p>Child ID #{{ child.child_id }}</p>
    </div>
    <a href="{{ url_for('patients.view_child', child_id=child.child_id) }}" class="btn btn-secondary btn-sm">Cancel</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('patients.edit_child', child_id=child.child_id) }}">
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ child.first_name }}" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ child.last_name }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="guardian_name">Guardian Name</label>
                <input type="text" id="guardian_name" name="guardian_name" value="{{ child.guardian_name }}" required>
            </div>
            <div class="form-group">
                <label for="guardian_phone_number">Guardian Phone</label>
                <div style="display:flex; align-items:center; border:1.5px solid var(--slate-200); border-radius:var(--radius-sm); overflow:hidden; background:#fff;">
                    <span style="padding:.48rem .7rem; background:var(--slate-50); color:var(--slate-600); font-size:.875rem; white-space:nowrap; border-right:1.5px solid var(--slate-200);">+234</span>
                    <input type="tel" id="guardian_phone_number" name="guardian_phone_number" required
                           value="{{ child.guardian_phone | replace('+234', '') }}"
                           maxlength="10"
                           style="border:none; flex:1; padding:.48rem .7rem; font-size:.875rem; outline:none; background:transparent;">
                </div>
                <input type="hidden" id="guardian_phone" name="guardian_phone" value="{{ child.guardian_phone }}">
            </div>
        </div>
        <div class="form-group">
            <label for="guardian_email">Guardian Email <span style="font-size:.75rem; color:var(--slate-400);">(optional)</span></label>
            <input type="email" id="guardian_email" name="guardian_email" value="{{ child.guardian_email or '' }}">
        </div>
        <div style="display:flex; gap:.5rem; margin-top:.5rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('patients.view_child', child_id=child.child_id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelector('form').addEventListener('submit', function() {
    var num = document.getElementById('guardian_phone_number').value.replace(/^0+/, '');
    document.getElementById('guardian_phone').value = '+234' + num;
});
</script>
{% endblock %}
