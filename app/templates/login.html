{% extends "base.html" %}
{% block title %}Sign In VaxTrack{% endblock %}

{% block public_content %}
<div style="width:100%; max-width:420px; padding:1rem;">
    <div style="text-align:center; margin-bottom:2rem;">
        <div style="margin-bottom:.75rem; display:flex; justify-content:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none"
                 stroke="var(--teal-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
        </div>
        <h1 style="font-size:1.6rem; font-weight:800; color:#fff; letter-spacing:-.5px;">VaxTrack</h1>
    </div>

    <div class="card" style="padding:1.75rem; border-radius:var(--radius-lg); border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.97); box-shadow:var(--shadow-lg);">
        <h2 style="font-size:1.05rem; font-weight:700; margin-bottom:1.25rem; color:var(--slate-800);">Sign in to your account</h2>
        <form method="POST" action="{{ url_for('auth.login') }}" class="no-loading" id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group" style="margin-bottom:1.25rem;">
                <label for="password">Password</label>
                <div style="position:relative;">
                    <input type="password" id="password" name="password" required autocomplete="current-password" style="padding-right:2.5rem;">
                    <button type="button" id="toggle-pw" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--slate-400);padding:0;line-height:0;" title="Show/hide password">
                        <svg id="pw-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.65rem;" id="login-btn">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
    var pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.style.opacity = pw.type === 'text' ? '1' : '.5';
});
document.getElementById('login-form').addEventListener('submit', function() {
    var btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
});
</script>
{% endblock %}
